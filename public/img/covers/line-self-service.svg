<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace">
  <defs>
    <linearGradient id="neon2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ff2ec4"/>
    </linearGradient>
    <pattern id="grid2" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#00f0ff" stroke-opacity="0.06"/>
    </pattern>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1200" height="630" fill="#07070f"/>
  <rect width="1200" height="630" fill="url(#grid2)"/>
  <circle cx="1020" cy="140" r="170" fill="#00f0ff" opacity="0.13" filter="url(#blur2)"/>
  <circle cx="200" cy="500" r="180" fill="#8b5cf6" opacity="0.15" filter="url(#blur2)"/>

  <!-- phone with rich menu -->
  <g transform="translate(150,90)">
    <rect x="0" y="0" width="270" height="460" rx="30" fill="#0b0b16" stroke="#00f0ff" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="95" y="16" width="80" height="10" rx="5" fill="#1a1a2c"/>
    <!-- chat bubbles -->
    <rect x="24" y="52" width="150" height="34" rx="12" fill="#141425"/>
    <rect x="96" y="98" width="150" height="34" rx="12" fill="#0e2a33" stroke="#00f0ff" stroke-opacity="0.4"/>
    <!-- rich menu grid -->
    <g stroke-width="1.2">
      <rect x="24" y="160" width="106" height="84" rx="10" fill="#101020" stroke="#00f0ff" stroke-opacity="0.55"/>
      <rect x="140" y="160" width="106" height="84" rx="10" fill="#101020" stroke="#8b5cf6" stroke-opacity="0.6"/>
      <rect x="24" y="254" width="106" height="84" rx="10" fill="#101020" stroke="#ff2ec4" stroke-opacity="0.5"/>
      <rect x="140" y="254" width="106" height="84" rx="10" fill="#101020" stroke="#00f0ff" stroke-opacity="0.55"/>
      <rect x="24" y="348" width="106" height="84" rx="10" fill="#101020" stroke="#8b5cf6" stroke-opacity="0.6"/>
      <rect x="140" y="348" width="106" height="84" rx="10" fill="#101020" stroke="#ff2ec4" stroke-opacity="0.5"/>
    </g>
    <!-- play triangles -->
    <path d="M68 190 l24 12 l-24 12 z" fill="#00f0ff"/>
    <path d="M184 190 l24 12 l-24 12 z" fill="#a78bfa"/>
    <path d="M68 284 l24 12 l-24 12 z" fill="#ff2ec4"/>
    <path d="M184 284 l24 12 l-24 12 z" fill="#00f0ff"/>
    <path d="M68 378 l24 12 l-24 12 z" fill="#a78bfa"/>
    <path d="M184 378 l24 12 l-24 12 z" fill="#ff2ec4"/>
  </g>

  <!-- headline -->
  <g transform="translate(540,240)">
    <text x="0" y="0" fill="#5c6178" font-size="22" letter-spacing="6">JOBWISE · LINE OA</text>
    <text x="0" y="62" fill="#e8e9f1" font-size="58" font-weight="bold" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Self-Service</text>
    <text x="0" y="126" fill="url(#neon2)" font-size="58" font-weight="bold" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Support Platform</text>
    <text x="0" y="180" fill="#9aa0b4" font-size="24">questions → 30-second video answers</text>
    <text x="0" y="240" fill="#00f0ff" font-size="26" letter-spacing="2">▸ 500+ students / year</text>
  </g>
</svg>
