<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace">
  <defs>
    <linearGradient id="neon3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ff2ec4"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0.8"/>
    </linearGradient>
    <pattern id="grid3" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#00f0ff" stroke-opacity="0.06"/>
    </pattern>
    <filter id="blur3"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1200" height="630" fill="#07070f"/>
  <rect width="1200" height="630" fill="url(#grid3)"/>
  <circle cx="1000" cy="150" r="170" fill="#8b5cf6" opacity="0.15" filter="url(#blur3)"/>
  <circle cx="220" cy="520" r="170" fill="#ff2ec4" opacity="0.11" filter="url(#blur3)"/>

  <!-- pipeline board -->
  <g transform="translate(120,140)">
    <rect x="0" y="0" width="400" height="330" rx="16" fill="#0b0b16" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="24" y="40" fill="#a78bfa" font-size="18" letter-spacing="4">SALES PIPELINE</text>
    <!-- kanban columns -->
    <g>
      <rect x="24" y="60" width="108" height="240" rx="10" fill="#101020"/>
      <rect x="146" y="60" width="108" height="240" rx="10" fill="#101020"/>
      <rect x="268" y="60" width="108" height="240" rx="10" fill="#101020"/>
      <rect x="36" y="76" width="84" height="30" rx="6" fill="#0e2a33" stroke="#00f0ff" stroke-opacity="0.5"/>
      <rect x="36" y="114" width="84" height="30" rx="6" fill="#141425"/>
      <rect x="36" y="152" width="84" height="30" rx="6" fill="#141425"/>
      <rect x="158" y="76" width="84" height="30" rx="6" fill="#1d1030" stroke="#8b5cf6" stroke-opacity="0.6"/>
      <rect x="158" y="114" width="84" height="30" rx="6" fill="#141425"/>
      <rect x="280" y="76" width="84" height="30" rx="6" fill="#2a0e22" stroke="#ff2ec4" stroke-opacity="0.5"/>
    </g>
    <!-- efficiency bars -->
    <g>
      <rect x="36" y="250" width="84" height="40" rx="4" fill="url(#bar)"/>
      <rect x="158" y="220" width="84" height="70" rx="4" fill="url(#bar)"/>
      <rect x="280" y="180" width="84" height="110" rx="4" fill="url(#bar)"/>
    </g>
  </g>

  <!-- headline -->
  <g transform="translate(600,250)">
    <text x="0" y="0" fill="#5c6178" font-size="22" letter-spacing="6">JOBWISE · FIRST CRM</text>
    <text x="0" y="62" fill="#e8e9f1" font-size="58" font-weight="bold" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">CRM Platform</text>
    <text x="0" y="126" fill="url(#neon3)" font-size="58" font-weight="bold" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Implementation</text>
    <text x="0" y="180" fill="#9aa0b4" font-size="24">spreadsheets → system of record</text>
    <text x="0" y="240" fill="#00f0ff" font-size="26" letter-spacing="2">▸ +80% workflow efficiency</text>
  </g>
</svg>
