<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ff2ec4"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#00f0ff" stroke-opacity="0.06"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1200" height="630" fill="#07070f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="180" cy="120" r="160" fill="#00f0ff" opacity="0.14" filter="url(#blur)"/>
  <circle cx="1050" cy="520" r="180" fill="#ff2ec4" opacity="0.12" filter="url(#blur)"/>
  <circle cx="700" cy="200" r="150" fill="#8b5cf6" opacity="0.14" filter="url(#blur)"/>

  <!-- three-layer system -->
  <g transform="translate(120,150)">
    <rect x="0" y="0" width="380" height="86" rx="14" fill="#0b0b16" stroke="#00f0ff" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="28" y="38" fill="#00f0ff" font-size="20" letter-spacing="4">LAYER 01</text>
    <text x="28" y="66" fill="#e8e9f1" font-size="24" font-weight="bold">MATERIAL DIAGNOSIS</text>

    <path d="M190 86 v28" stroke="url(#neon)" stroke-width="2"/>
    <path d="M184 108 l6 10 l6 -10" fill="none" stroke="url(#neon)" stroke-width="2"/>

    <rect x="0" y="120" width="380" height="86" rx="14" fill="#0b0b16" stroke="#8b5cf6" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="28" y="158" fill="#a78bfa" font-size="20" letter-spacing="4">LAYER 02</text>
    <text x="28" y="186" fill="#e8e9f1" font-size="24" font-weight="bold">DOCUMENT GENERATION</text>

    <path d="M190 206 v28" stroke="url(#neon)" stroke-width="2"/>
    <path d="M184 228 l6 10 l6 -10" fill="none" stroke="url(#neon)" stroke-width="2"/>

    <rect x="0" y="240" width="380" height="86" rx="14" fill="#0b0b16" stroke="#ff2ec4" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="28" y="278" fill="#ff2ec4" font-size="20" letter-spacing="4">LAYER 03</text>
    <text x="28" y="306" fill="#e8e9f1" font-size="24" font-weight="bold">REVISION CONTROL</text>
  </g>

  <!-- headline -->
  <g transform="translate(600,250)">
    <text x="0" y="0" fill="#5c6178" font-size="22" letter-spacing="6">GOSTUDY co.</text>
    <text x="0" y="62" fill="#e8e9f1" font-size="58" font-weight="bold" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">AI Document</text>
    <text x="0" y="126" fill="url(#neon)" font-size="58" font-weight="bold" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Engine</text>
    <text x="0" y="180" fill="#9aa0b4" font-size="24">raw data → competitive documents</text>
    <text x="0" y="240" fill="#00f0ff" font-size="26" letter-spacing="2">▸ 40× projected cost reduction</text>
  </g>
</svg>
